name: OneShotOneNight
options:
  bundleIdPrefix: com.oneshotonenight
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 7B5U63YN3A
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: false
    ENABLE_USER_SCRIPT_SANDBOXING: true
    API_BASE_URL: https://huakafctiajezinrzfle.supabase.co/functions/v1/api
    PUBLIC_WEB_URL: https://one-shot-one-night.vercel.app
targets:
  OneShotOneNight:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: App
    resources:
      - path: Shared/Resources
    dependencies:
      - target: AppClip
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneshotonenight.app
        PRODUCT_NAME: OneShotOneNight
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/OneShotOneNight.entitlements
        SUPPORTS_MACCATALYST: false
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: App/OneShotOneNight.Debug.entitlements
  AppClip:
    type: com.apple.product-type.application.on-demand-install-capable
    platform: iOS
    sources:
      - path: AppClip
      - path: Shared/Theme.swift
    resources:
      - path: Shared/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneshotonenight.app.Clip
        PRODUCT_NAME: OneShotOneNight Clip
        INFOPLIST_FILE: AppClip/Info.plist
        CODE_SIGN_ENTITLEMENTS: AppClip/AppClip.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        SKIP_INSTALL: true
        APP_CLIP_ASSOCIATED_DOMAIN: example.com
      configs:
        Debug:
          APP_CLIP_TEST_MODE: true
        Release:
          APP_CLIP_TEST_MODE: false
  OneShotOneNightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: OneShotOneNight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneshotonenight.app.tests
        GENERATE_INFOPLIST_FILE: true
  OneShotOneNightUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: OneShotOneNight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneshotonenight.app.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: OneShotOneNight
schemes:
  OneShotOneNight:
    build:
      targets:
        OneShotOneNight: all
        OneShotOneNightTests: [test]
        OneShotOneNightUITests: [test]
    test:
      targets:
        - OneShotOneNightTests
        - OneShotOneNightUITests
    run:
      config: Debug
    archive:
      config: Release
  AppClip:
    build:
      targets:
        AppClip: all
    run:
      config: Debug
      environmentVariables:
        APP_CLIP_TEST_MODE: "true"
        _XCAppClipURL: "https://example.com/e/test-event"
    archive:
      config: Release
