name: Nightframe
options:
  bundleIdPrefix: com.barzibahadin.nightframe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 7B5U63YN3A
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: false
    ENABLE_USER_SCRIPT_SANDBOXING: true
    API_BASE_URL: https://huakafctiajezinrzfle.supabase.co/functions/v1/api
    PUBLIC_WEB_URL: https://one-shot-one-night.vercel.app
targets:
  Nightframe:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: App
    resources:
      - path: Shared/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barzibahadin.nightframe
        PRODUCT_NAME: Nightframe
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Nightframe.entitlements
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: App/Nightframe.Debug.entitlements
  NightframeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Nightframe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barzibahadin.nightframe.tests
        GENERATE_INFOPLIST_FILE: true
  NightframeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Nightframe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barzibahadin.nightframe.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Nightframe
schemes:
  Nightframe:
    build:
      targets:
        Nightframe: all
        NightframeTests: [test]
        NightframeUITests: [test]
    test:
      targets:
        - NightframeTests
        - NightframeUITests
    run:
      config: Debug
    archive:
      config: Release
