name: OneShotOneNight
options:
  bundleIdPrefix: com.oneshotonenight
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 7B5U63YN3A
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: false
    ENABLE_USER_SCRIPT_SANDBOXING: true
targets:
  OneShotOneNight:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: App
    resources:
      - path: Shared/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oneshotonenight.app
        PRODUCT_NAME: OneShotOneNight
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  OneShotOneNight:
    build:
      targets:
        OneShotOneNight: all
    run:
      config: Debug
    archive:
      config: Release
